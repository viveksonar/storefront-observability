# kube-prometheus-stack: Grafana under path /grafana (same host as the SPA)
#
# Use with:
#   helm upgrade --install monitoring prometheus-community/kube-prometheus-stack -n monitoring -f k8s/helm-monitoring-kps-values.yaml ...
#
# The key is `grafana.ini` (one key name with a dot) under the `grafana:` block, not
# a nested `grafana:` key — a wrong --set from the command line is easy to mis-indent.
grafana:
  adminPassword: storefront123
  service:
    type: ClusterIP
  grafana.ini:
    server:
      # Public URL and subpath; must match ingress path /grafana
      root_url: https://agoda.viveksonar.in/grafana
      serve_from_sub_path: true
  # Defensive: env also forces behavior if ini merge ever misbehaves
  env:
    GF_SERVER_ROOT_URL: https://agoda.viveksonar.in/grafana
    GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    GF_SERVER_DOMAIN: agoda.viveksonar.in
  # Loki in `monitoring` (helm-loki-values.yaml + install-loki.sh). Explore → Loki.
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      uid: loki
      url: http://loki:3100
      isDefault: false
      jsonData:
        maxLines: 1000
    - name: Tempo
      type: tempo
      access: proxy
      uid: tempo
      url: http://tempo:3200
      isDefault: false
      jsonData:
        httpMethod: GET
        serviceMap:
          datasourceUid: prometheus
        tracesToLogsV2:
          datasourceUid: loki
          filterByTraceID: true
          spanStartTimeShift: "-1m"
          spanEndTimeShift: "1m"
# Core Kubernetes scrapes (node_exporter, kube-state-metrics, kubelet/cAdvisor, etc.)
kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true
defaultRules:
  create: true

prometheus:
  prometheusSpec:
    # Standard scrape/eval cadence for cluster-wide targets
    scrapeInterval: 30s
    evaluationInterval: 30s
    # Empty selectors = discover ServiceMonitors / PodMonitors in all namespaces
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
