apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront-obs-backend
  labels:
    app: storefront-obs-backend
spec:
  # In-memory MetricSimulator: all /metrics* and /simulate must hit the same process.
  # With 2+ replicas, load balancing made “switch failure mode then open Forecast” look
  # like a reset (POST on pod A, GET /metrics/forecast on pod B = still normal).
  # Scale to 2+ only with session-affinity on the Service (see below) or shared state.
  replicas: 1
  selector:
    matchLabels:
      app: storefront-obs-backend
  template:
    metadata:
      labels:
        app: storefront-obs-backend
    spec:
      # Name must match docker-registry Secret in this namespace (see deploy.env.example).
      imagePullSecrets:
        - name: registry-docr
      containers:
        - name: backend
          image: observability/backend:latest
          imagePullPolicy: Always
          env:
            - name: ENVIRONMENT
              value: "prod"
            - name: OTEL_SERVICE_NAME
              value: "storefront-obs-backend"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              # CPU requests = limits intentionally.
              # Agoda's K8s migration article documented a service hitting
              # CFS throttling at 43% CPU utilisation because thread bursts
              # exhausted the quota window. Setting requests == limits
              # eliminates the burst headroom that causes CFS stalls.
              # Source: "Private Cloud and You" — Agoda Engineering, Nov 2022
              memory: "256Mi"
              # Memory limit is 2x request, not equal.
              # Python has no off-heap memory issue (unlike JVM), so we
              # don't need the tight JVM off-heap buffer described in the
              # Kubernetes migration article. Standard 2x headroom is safe.
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: storefront-obs-backend
  labels:
    app: storefront-obs-backend
spec:
  # Sticky from the frontend pod (ClusterIP client) so if replicas>1, the same
  # backend instance serves /simulate and all /metrics* for that path.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  selector:
    app: storefront-obs-backend
  ports:
    - port: 8000
      targetPort: 8000
