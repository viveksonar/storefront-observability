apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront-obs-frontend
  labels:
    app: storefront-obs-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storefront-obs-frontend
  template:
    metadata:
      labels:
        app: storefront-obs-frontend
    spec:
      imagePullSecrets:
        - name: registry-docr
      containers:
        - name: frontend
          image: observability/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: storefront-obs-frontend
spec:
  # Traffic enters via Ingress (install-ingress-nginx.sh), not a public LB here.
  type: ClusterIP
  selector:
    app: storefront-obs-frontend
  ports:
    - port: 80
      targetPort: 80
