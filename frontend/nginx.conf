server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # All Storefront API paths (including /metrics/forecast, /incidents/active) go to FastAPI.
    # Match any subpath under these prefixes so new routes never 404 at nginx.
    # In K8s: backend service is storefront-obs-backend:8000
    location ~ ^/(metrics|simulate|incidents|health|forecast)(/.*)?$ {
        proxy_pass http://storefront-obs-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
