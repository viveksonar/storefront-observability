server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to backend service
    # In K8s: backend service name is storefront-obs-backend
    location /metrics {
        proxy_pass http://storefront-obs-backend:8000;
        proxy_set_header Host $host;
    }

    location /simulate {
        proxy_pass http://storefront-obs-backend:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
